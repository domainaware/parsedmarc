name: parsedmarc-dashboards

include:
  - docker-compose.yml

services:
  kibana:
    image: docker.elastic.co/kibana/kibana:8.19.7
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "127.0.0.1:5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3
    environment:
      - OPENSEARCH_HOSTS=["https://opensearch:9200"]
    ports:
      - "127.0.0.1:5602:5601"
    depends_on:
      opensearch:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    environment:
      # Grafana reads GF_SECURITY_ADMIN_PASSWORD, not GRAFANA_PASSWORD. Default
      # to "admin" so the login matches the bootstrap script's GRAFANA_PASSWORD
      # default; set GRAFANA_PASSWORD in .env to change both in lockstep.
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      # "elasticsearch" is required on Grafana >= 13, which no longer bundles
      # the Elasticsearch datasource as a core plugin.
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel,elasticsearch
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgresql:
        condition: service_healthy

  postgresql:
    image: postgres:17
    environment:
      - POSTGRES_USER=${POSTGRESQL_USER:-parsedmarc}
      - POSTGRES_PASSWORD=${POSTGRESQL_PASSWORD:-parsedmarc}
      - POSTGRES_DB=${POSTGRESQL_DB:-parsedmarc}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRESQL_USER:-parsedmarc} -d ${POSTGRESQL_DB:-parsedmarc}"
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  splunk:
    image: splunk/splunk:latest
    environment:
      - SPLUNK_START_ARGS=--accept-license
      - "SPLUNK_GENERAL_TERMS=--accept-sgt-current-at-splunk-com"
      - SPLUNK_PASSWORD=${SPLUNK_PASSWORD}
      - SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN}
    ports:
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:8088:8088"
