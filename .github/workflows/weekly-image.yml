name: Weekly hardened image

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-weekly:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=schedule,pattern=weekly-{{date 'YYYYMMDD'}}
            type=raw,value=weekly

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push weekly image
        uses: docker/build-push-action@v6
        with:
          context: .
          pull: true
          push: true
          sbom: true
          provenance: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Pull weekly tag for scanning
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:weekly

      - name: Generate SBOM artifact
        run: docker sbom --output sbom-weekly.spdx.json --format spdx-json ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:weekly

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-weekly
          path: sbom-weekly.spdx.json

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:weekly
          ignore-unfixed: true
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
